# My first docker-COMPOSE.YML FILE😭😁
version: "3.9"

services:
  app:
    build: .
    container_name: url-shortener
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
    environment:
      DB_HOST: ******
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: ******
      DB_NAME: urlshortener
      DB_SSLMODE: disable

      REDIS_ADDR: redis:6379

  postgres:
    image: ******:17
    container_name: *******
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: *******
      POSTGRES_DB: urlshortener
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis-cache
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: